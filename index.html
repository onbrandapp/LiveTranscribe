<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini Live Transcribe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            banana: '#FFE135',
            matte: '#0A0A0A',
            surface: {
              light: '#FFFFFF',
              dark: '#141414'
            }
          },
          transitionTimingFunction: {
            'out-back': 'cubic-bezier(0.34, 1.56, 0.64, 1)',
            'smooth': 'cubic-bezier(0.4, 0, 0.2, 1)',
          },
          animation: {
            'glow-pulse': 'glow-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            'glow-pulse': {
              '0%, 100%': { opacity: 1, transform: 'scale(1)' },
              '50%': { opacity: 0.85, transform: 'scale(1.01)' },
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 
       Refined Custom Scrollbar 
       Engineered for visibility on both desktop (hover) and mobile (static)
    */
    .custom-scrollbar {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 225, 53, 0.4) transparent;
      -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
    }

    /* Track */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px; /* Increased from 6px for better touch targeting */
    }
    
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    /* Handle/Thumb */
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: rgba(0, 0, 0, 0.2);
      border-radius: 20px;
      /* Using border as a 'margin' trick to make the scrollbar look centered and thin */
      border: 2px solid transparent;
      background-clip: padding-box;
      transition: background-color 0.3s ease;
    }

    /* Dark Mode Thumb - The Banana Yellow Glow */
    .dark .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: rgba(255, 225, 53, 0.15);
    }
    
    /* Mobile / Touch Device Visibility Fix 
       Since there is no hover on mobile, we ensure the banana tint is always visible
    */
    @media (hover: none) {
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: rgba(255, 225, 53, 0.4) !important;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: rgba(255, 225, 53, 0.3) !important;
      }
    }

    /* Desktop Hover States */
    .custom-scrollbar:hover::-webkit-scrollbar-thumb {
      background-color: rgba(255, 225, 53, 0.5);
    }
    
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background-color: #FFE135 !important;
      box-shadow: 0 0 10px rgba(255, 225, 53, 0.5);
    }
    
    .overlay-blur {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    
    @keyframes slide-up {
      0% { transform: translateY(100%); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    @keyframes slide-down {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(100%); opacity: 0; }
    }
    
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fade-out {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    
    .animate-slide-up {
      animation: slide-up 0.4s cubic-bezier(0.34, 1.3, 0.64, 1) forwards;
    }

    .animate-slide-down {
      animation: slide-down 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    
    .animate-fade-in {
      animation: fade-in 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .animate-fade-out {
      animation: fade-out 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .layout-transition {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Active bubble highlight with pronounced banana yellow glow */
    .bubble-active-user {
      box-shadow: 0 0 30px rgba(255, 225, 53, 0.6), 0 0 10px rgba(255, 225, 53, 0.4);
    }
    .bubble-active-model {
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.08);
    }
    .dark .bubble-active-model {
      box-shadow: 0 0 20px rgba(255, 225, 53, 0.15);
    }
  </style>
<script type="importmap">

  }
}
</script>

</head>

</html>
